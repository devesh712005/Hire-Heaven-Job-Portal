version: "3.8"

services:
  frontend:
    image: devesh712005/frontend:latest
    ports:
      - "3000:3000"
    env_file:
      - ./env/frontend.env
    restart: always
    depends_on:
      - auth
      - job
      - user

  auth:
    image: devesh712005/auth:latest
    ports:
      - "5000:5000"
    env_file:
      - ./env/auth.env
    restart: always
    depends_on:
      - kafka

  utils:
    image: devesh712005/utils:latest
    ports:
      - "5001:5001"
    env_file:
      - ./env/utils.env
    restart: always

  user:
    image: devesh712005/user:latest
    ports:
      - "5002:5002"
    env_file:
      - ./env/user.env
    restart: always
    depends_on:
      - kafka

  job:
    image: devesh712005/job:latest
    ports:
      - "5003:5003"
    env_file:
      - ./env/job.env
    restart: always
    depends_on:
      - kafka

  payment:
    image: devesh712005/payment:latest
    ports:
      - "5004:5004"
    env_file:
      - ./env/payment.env
    restart: always
    depends_on:
      - kafka

  kafka:
    image: apache/kafka:4.1.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    restart: always
